name: CI Pipeline Playlist App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v3
      - name: Builder l image Docker
        run: docker build -t playlist-app .
      - name: Lancer les tests
        run: docker run --rm playlist-app