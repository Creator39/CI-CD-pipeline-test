name: CI Pipeline Playlist App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  IMAGE_NAME: playlist-app
  IMAGE_TAG: latest

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v3
      - name: Builder l image Docker
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG}} .
      - name: Lancer les tests
        run: docker run --rm ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
      - name: verifier le secret
        env:
          TOKEN: ${{secrets.APP_SCRET_TOKEN }}
        run: |
         if [ -z "${{ env.TOKEN }}"]; then
           echo "Secret manquant !"
           exit 1
         else
           echo "Secret present et masque"
         fi
